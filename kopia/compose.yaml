services:
  kopia:
    image: kopia/kopia:latest
    hostname: kopia.alpenglow.acbc.house
    container_name: Kopia
    restart: unless-stopped
    command:
      - server
      - start
      - --disable-csrf-token-checks
      - --insecure
      - --address=0.0.0.0:51515
      - --server-username=alpenglower
      - --server-password=$KOPIA_PASSWORD
    volumes:
      # Mount local folders needed by kopia
      - ./config/dir:/app/config
      - ./cache:/app/cache
      - ./logs/dir:/app/logs
        # Mount local folders to snapshot
      - /data:/data:ro
        # Mount path for browsing mounted snaphots
      - ./tmp:/tmp:shared
    env_file:
      - ./.env
    labels:
      caddy: "*.alpenglow.acbc.house"
      caddy.@kopia.host: "kopia.alpenglow.acbc.house"
      caddy.reverse_proxy: "@kopia {{upstreams http 51515}}"
    networks:
      - caddy

networks:
  caddy:
    external: true
