
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 10.0.3.0/24

homeassistant:
  auth_providers:
    - type: homeassistant
    - type: trusted_networks
      trusted_networks:
        - 192.168.68.57/32 # kitchen display

auth_oidc:
  client_id: homeassistant
  client_secret: !secret oidc_client_secret
  discovery_url: https://sso.acbc.house/realms/acbc.house/.well-known/openid-configuration
  display_name: "acbc.house"
  groups_scope: roles
  claims:
    groups: ha-roles
  roles:
    admin: ha-admin
    user: ha-user

logger:
  default: warning
  logs: {}
    # custom_components.auth_oidc: debug
