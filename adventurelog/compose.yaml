services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - caddy
      - default
    depends_on:
      - web
      - server
    labels:
      caddy: "*.acbc.house"
      caddy.@travel.host: "travel.acbc.house"
      caddy.reverse_proxy: "@travel {{upstreams http 80}}"

  web:
    image: ghcr.io/seanmorley15/adventurelog-frontend:latest
    restart: unless-stopped
    env_file: .env
    networks:
      - default
    depends_on:
      - server

  server:
    image: ghcr.io/seanmorley15/adventurelog-backend:latest
    restart: unless-stopped
    env_file: .env
    networks:
      - default
    depends_on:
      - db
    volumes:
      - adventurelog_media:/code/media/

  db:
    image: postgis/postgis:16-3.5
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/

volumes:
  postgres_data:
  adventurelog_media:

networks:
  caddy:
    external: true
