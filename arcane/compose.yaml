services:
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - /services:/app/data/projects:ro
    env_file: .env
    restart: unless-stopped
    networks:
    - caddy
    labels:
      caddy: "*.alpenglow.acbc.house"
      caddy.@arcane.host: "arcane.alpenglow.acbc.house"
      caddy.reverse_proxy: "@arcane {{upstreams 3552}}"

networks:
  caddy:
    external: true
