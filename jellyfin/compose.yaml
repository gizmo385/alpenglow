services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 110:114
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0
    group_add:
    - "992"
    volumes:
      - ./config:/config
      - /data/jellyfin/cache:/cache
      - type: bind
        source: /data/jellyfin/media
        target: /media
    restart: 'unless-stopped'
    environment:
      # Optional - alternative address used for autodiscovery
      - JELLYFIN_PublishedServerUrl=http://jellyfin.acbc.house
    networks:
      - caddy 
    labels:
      caddy: "*.acbc.house"
      caddy.@jellyfin.host: "jellyfin.acbc.house"
      caddy.reverse_proxy: "@jellyfin {{upstreams http 8096}}"

networks:
  caddy:
    external: true
