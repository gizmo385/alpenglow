  # Listen on all interfaces within the container
  listen = "[::]:8080"

  # IMPORTANT: Change to your actual domain
  allowed-hosts = ["attic.alpenglow.acbc.house"]
  api-endpoint = "https://attic.alpenglow.acbc.house/"

  [database]
  url = "sqlite:///data/attic.db?mode=rwc"

  [storage]
  type = "local"
  path = "/storage"

  [chunking]
  nar-size-threshold = 65536  # 64 KiB
  min-size = 16384            # 16 KiB
  avg-size = 65536            # 64 KiB
  max-size = 262144           # 256 KiB

  [compression]
  type = "zstd"
  level = 3

  [garbage-collection]
  interval = "12 hours"
  default-retention-period = "7 days"
