---
services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    env_file:
      - path: ./.env
        required: true
    volumes:
      - ./config:/config
      - ./config:/var/www/FreshRSS/data
    networks:
      - caddy
      - postgres
    labels:
      caddy: "*.acbc.house"
      caddy.@rss.host: "rss.acbc.house"
      caddy.reverse_proxy: "@rss {{upstreams http 80}}"
    restart: unless-stopped

networks:
  caddy:
    external: true
  postgres:
    external: true
