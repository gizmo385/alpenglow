# Manual mappings from Docker image names to GitHub owner/repo.
# Used for images where automatic detection (OCI labels, GHCR) doesn't work.
#
# The key is the image name WITHOUT the tag (e.g., "postgres" not "postgres:16").
# The value is the GitHub "owner/repo".
#
# Examples:
#   postgres: postgres/postgres
#   redis: redis/redis
#   nginx: nginx/nginx

overrides:
  nextcloud: nextcloud/server
  ollama/ollama: ollama/ollama
  redis: redis/redis
  fmtr/amniotic: fmtr/amniotic
  alangrainger/immich-public-proxy: alangrainger/immich-public-proxy
  valkey/valkey: valkey/valkey
  kopia/kopia: kopia/kopia
  # GitHub repo name differs from image name
  home-assistant/home-assistant: home-assistant/core
  # Multiple immich images share one repo
  immich-app/immich-server: immich-app/immich
  immich-app/machine-learning: immich-app/immich
  # OCI label points to Red Hat build repo, not the actual source
  quay.io/keycloak/keycloak: keycloak/keycloak
  pihole/pihole: pi-hole/pi-hole

names:
  home-assistant/core: Home Assistant
  immich-app/immich: Immich
  keycloak/keycloak: Keycloak
  nextcloud/server: Nextcloud
  ollama/ollama: Ollama
  redis/redis: Redis
  valkey/valkey: Valkey
  kopia/kopia: Kopia
  fmtr/amniotic: Amniotic
  pihole/pihole: Pi-hole

ignore:
  # We're on a fork of these
  - immichFrame/ImmichFrame
  - gizmo385/servo
